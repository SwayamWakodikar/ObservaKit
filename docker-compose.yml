version: '3.8'

services:

  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  log-generator:
    build:
      context: ./services/dev/log-generator
    container_name: log-generator
    restart: always
    volumes:
      - ./services/dev/log-generator/logs:/app/logs
    command: ["node", "generator.js"]

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    restart: always
    depends_on:
      - kafka
      - log-generator
    volumes:
      - ./configs/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./services/dev/log-generator/logs:/logs:ro

  log-consumer:
    build:
      context: ./services/dev/log-consumer
    container_name: log-consumer
    restart: always
    depends_on:
      - kafka
    command: ["node", "kafka-consumer.js"]
    environment:
      - KAFKA_BROKER=kafka:9092